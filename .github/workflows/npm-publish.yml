name: npm Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      confirm_publish:
        description: "For dry_run=false, type: publish <version>"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    env:
      DRY_RUN: ${{ inputs.dry_run }}
      CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Validate release dispatch
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          expected_tag="v${version}"

          if [[ "${DRY_RUN}" != "true" && "${DRY_RUN}" != "false" ]]; then
            echo "::error::dry_run must be true or false."
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "::error::Run this workflow from tag ${expected_tag}; got ${GITHUB_REF}."
            exit 1
          fi

          if [[ "${DRY_RUN}" == "false" && "${CONFIRM_PUBLISH}" != "publish ${version}" ]]; then
            echo "::error::For dry_run=false, confirm_publish must be exactly: publish ${version}"
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "expected_tag=${expected_tag}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: npm ci

      - name: Run release gates
        run: |
          npm run build --silent
          npm run typecheck --silent
          npm run lint --silent
          npm test --silent
          npm run release:verify --silent
          npm run provenance:scan --silent
          npm run cellfence:self-check --silent
          npm run pack:smoke --silent
          npm run sbom:generate --silent
          git diff --check

      - name: Preflight npm package visibility
        shell: bash
        run: |
          set -euo pipefail

          # Include only packages that already exist on npm and can have Trusted Publisher configured.
          package_dirs=(
            packages/schema
            packages/plugin-api
            packages/adapter-call-pattern
            packages/adapter-opentelemetry
            packages/plugin-agent-budget
            packages/plugin-blast-radius
            packages/plugin-dependency-sovereignty
            packages/plugin-geo-purity
            packages/plugin-legacy-strangler
            packages/plugin-quants-trend
            packages/reporter-economy-matrix
            packages/engine
            packages/cli
            packages/github-action
            packages/trace
          )

          missing_packages=0
          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -p "JSON.parse(require('fs').readFileSync('${package_dir}/package.json', 'utf8')).name")"
            if npm view "${package_name}" version >/dev/null 2>&1; then
              echo "${package_name} is visible on npm."
            else
              echo "::warning::${package_name} is not visible on npm; configure ownership/trusted publishing before dry_run=false."
              missing_packages=1
            fi
          done

          if [[ "${DRY_RUN}" == "false" && "${missing_packages}" -ne 0 ]]; then
            echo "::error::Refusing to publish because at least one workspace package is not visible on npm."
            exit 1
          fi

      - name: Publish workspaces
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          # Keep this in sync with the preflight list above.
          package_dirs=(
            packages/schema
            packages/plugin-api
            packages/adapter-call-pattern
            packages/adapter-opentelemetry
            packages/plugin-agent-budget
            packages/plugin-blast-radius
            packages/plugin-dependency-sovereignty
            packages/plugin-geo-purity
            packages/plugin-legacy-strangler
            packages/plugin-quants-trend
            packages/reporter-economy-matrix
            packages/engine
            packages/cli
            packages/github-action
            packages/trace
          )

          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -p "JSON.parse(require('fs').readFileSync('${package_dir}/package.json', 'utf8')).name")"
            package_version="$(node -p "JSON.parse(require('fs').readFileSync('${package_dir}/package.json', 'utf8')).version")"

            if [[ "${package_version}" != "${RELEASE_VERSION}" ]]; then
              echo "::error::${package_name} is ${package_version}, expected ${RELEASE_VERSION}."
              exit 1
            fi

            publish_args=(publish)
            if [[ "${package_name}" == @* ]]; then
              publish_args+=(--access public)
            fi
            if [[ "${DRY_RUN}" == "true" ]]; then
              publish_args+=(--dry-run)
            fi

            echo "::group::${package_name}@${package_version}"
            (cd "${package_dir}" && npm "${publish_args[@]}")
            echo "::endgroup::"
          done

      - name: Post-publish registry smoke
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          # Keep this in sync with the publish list above.
          package_dirs=(
            packages/schema
            packages/plugin-api
            packages/adapter-call-pattern
            packages/adapter-opentelemetry
            packages/plugin-agent-budget
            packages/plugin-blast-radius
            packages/plugin-dependency-sovereignty
            packages/plugin-geo-purity
            packages/plugin-legacy-strangler
            packages/plugin-quants-trend
            packages/reporter-economy-matrix
            packages/engine
            packages/cli
            packages/github-action
            packages/trace
          )

          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -p "JSON.parse(require('fs').readFileSync('${package_dir}/package.json', 'utf8')).name")"
            for attempt in 1 2 3 4 5 6; do
              if npm view "${package_name}@${RELEASE_VERSION}" version | grep -Fx "${RELEASE_VERSION}" >/dev/null; then
                echo "${package_name}@${RELEASE_VERSION} is visible on npm."
                break
              fi

              if [[ "${attempt}" -eq 6 ]]; then
                echo "::error::${package_name}@${RELEASE_VERSION} is not visible on npm."
                exit 1
              fi

              sleep 10
            done
          done

          fixture_dir="$(mktemp -d)"
          npm_cache_dir="$(mktemp -d)"
          mkdir -p "${fixture_dir}/src/example"
          cat > "${fixture_dir}/src/example/public.ts" <<'EOF'
          export const example = true;
          EOF
          cat > "${fixture_dir}/cellfence.manifest.json" <<'EOF'
          {
            "schemaVersion": "cellfence.manifest.v1",
            "governance": {
              "requireOwnership": true,
              "include": ["src/**"],
              "exclude": [],
              "requiredRules": [
                "CELLFENCE_OWNERSHIP_OVERLAP",
                "CELLFENCE_UNOWNED_SOURCE",
                "CELLFENCE_UNOWNED_IMPORT_TARGET",
                "CELLFENCE_PUBLIC_ENTRY_OUTSIDE_OWNERSHIP",
                "CELLFENCE_ARTIFACT_OUTSIDE_OWNERSHIP",
                "CELLFENCE_SYMLINK_TARGET_OUTSIDE_OWNERSHIP",
                "CELLFENCE_PRIVATE_IMPORT",
                "CELLFENCE_UNSUPPORTED_DYNAMIC_IMPORT",
                "CELLFENCE_UNSUPPORTED_DYNAMIC_REQUIRE",
                "CELLFENCE_REQUIRED_RULE_DISABLED",
                "CELLFENCE_WAIVER_INVALID"
              ]
            },
            "cells": [
              {
                "id": "example",
                "ownedPaths": ["src/example/**"],
                "publicEntry": "src/example/public.ts",
                "publicSymbols": ["example"],
                "consumes": [],
                "producesArtifacts": []
              }
            ]
          }
          EOF

          (
            cd "${fixture_dir}"
            npm_config_cache="${npm_cache_dir}" npx --yes "cellfence@${RELEASE_VERSION}" check --manifest cellfence.manifest.json --json
          )
