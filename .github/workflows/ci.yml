name: CellFence CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run cellfence:self-check

  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run provenance:scan

  release-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:verify

  scale-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run benchmark:scale

  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run pack:smoke

  ci-counts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Count CI violations by category
        run: npm run ci:count
      - name: Summarize CI violation counts
        if: always()
        run: |
          node -e '
            const fs = require("fs");
            const p = "tmp/ci-counts/summary.json";
            if (!fs.existsSync(p)) {
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, "## CI Violation Counts\n\nsummary.json was not produced.\n");
              process.exit(0);
            }
            const s = JSON.parse(fs.readFileSync(p, "utf8"));
            const rows = Object.entries(s.results).map(([name, result]) => {
              const count = result.errors ?? result.failures ?? result.findings ?? result.uncovered?.total ?? result.exitCode;
              return `| ${name} | ${result.exitCode} | ${count} |`;
            });
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
              "## CI Violation Counts",
              "",
              "| category | exitCode | count |",
              "|---|---:|---:|",
              ...rows,
              ""
            ].join("\n"));
          '
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: ci-counts
          path: tmp/ci-counts
