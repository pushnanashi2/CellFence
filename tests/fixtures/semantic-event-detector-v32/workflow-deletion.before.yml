name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: |
          echo "$NPM_TOKEN"
          npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
