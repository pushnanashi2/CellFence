name: CellFence Check
description: Run CellFence repository governance checks.
inputs:
  manifest:
    description: Path to the CellFence manifest.
    required: false
    default: cellfence.manifest.json
  baseline:
    description: Optional baseline path for ratchet checks.
    required: false
    default: ""
  evidence:
    description: Optional runtime resource evidence JSON path.
    required: false
    default: ""
  version:
    description: Published CellFence CLI version to run. Use an exact version for required checks.
    required: false
    default: latest
runs:
  using: composite
  steps:
    - shell: bash
      env:
        CELLFENCE_ACTION_MANIFEST: ${{ inputs.manifest }}
        CELLFENCE_ACTION_BASELINE: ${{ inputs.baseline }}
        CELLFENCE_ACTION_EVIDENCE: ${{ inputs.evidence }}
        CELLFENCE_ACTION_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        cli_version="${CELLFENCE_ACTION_VERSION}"
        if [ -z "${cli_version}" ]; then
          cli_version="latest"
        fi
        cli_package="cellfence@${cli_version}"
        evidence_args=()
        if [ -n "${CELLFENCE_ACTION_EVIDENCE}" ]; then
          evidence_args=(--evidence "${CELLFENCE_ACTION_EVIDENCE}")
        fi
        if [ -n "${CELLFENCE_ACTION_BASELINE}" ]; then
          npx --yes "${cli_package}" baseline check --manifest "${CELLFENCE_ACTION_MANIFEST}" --baseline "${CELLFENCE_ACTION_BASELINE}" "${evidence_args[@]}"
        else
          npx --yes "${cli_package}" check --manifest "${CELLFENCE_ACTION_MANIFEST}" "${evidence_args[@]}"
        fi
