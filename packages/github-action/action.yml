name: CellFence Check
description: Run CellFence repository governance checks.
inputs:
  manifest:
    description: Path to the CellFence manifest.
    required: false
    default: cellfence.manifest.json
  baseline:
    description: Optional baseline path for ratchet checks.
    required: false
    default: ""
  evidence:
    description: Optional runtime resource evidence JSON path.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        evidence_args=()
        if [ -n "${{ inputs.evidence }}" ]; then
          evidence_args=(--evidence "${{ inputs.evidence }}")
        fi
        if [ -n "${{ inputs.baseline }}" ]; then
          npx --yes cellfence@0.1.9 baseline check --manifest "${{ inputs.manifest }}" --baseline "${{ inputs.baseline }}" "${evidence_args[@]}"
        else
          npx --yes cellfence@0.1.9 check --manifest "${{ inputs.manifest }}" "${evidence_args[@]}"
        fi
